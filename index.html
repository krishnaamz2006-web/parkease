<!DOCTYPE html>
<html>
<head>
  <title>Park Ease</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    /* LOGIN */
    #login {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      margin: 120px auto;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    #login input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    #login button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    #login button:hover {
      background: #4f46e5;
    }

    /* DASHBOARD */
    .dashboard {
      display: none;
      margin-top: 40px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: 20px auto;
      backdrop-filter: blur(10px);
    }

    select {
      padding: 8px;
      border-radius: 8px;
      border: none;
    }

    /* GRID */
    .parking-grid {
      display: grid;
      grid-template-columns: repeat(2, 120px);
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
    }

    /* SLOTS */
    .slot {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 600;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .slot:hover {
      transform: scale(1.08);
    }

    .slot.reserved {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🚗 Park Ease Login</h2>
  <input type="text" id="username" placeholder="Enter Username">
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <h1>🚗 Park Ease</h1>

  <div class="card">
    <p id="count"></p>

    <label>Select Duration</label><br><br>

    <select id="duration">
      <option value="7200">2 hours - ₹60</option>
      <option value="14400">4 hours - ₹120</option>
    </select>

    <p id="price"></p>
  </div>

  <div class="parking-grid">
    <div class="slot" data-id="P1" onclick="reserve(this)">P1</div>
    <div class="slot" data-id="P2" onclick="reserve(this)">P2</div>
    <div class="slot" data-id="P3" onclick="reserve(this)">P3</div>
    <div class="slot" data-id="P4" onclick="reserve(this)">P4</div>
  </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function() {

  document.getElementById("duration").addEventListener("change", function() {
    let value = Number(this.value);
    let price = (value / 3600) * 30;
    document.getElementById("price").innerText = "Price: ₹" + price;
  });

});

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    updateCount();
  } else {
    alert("Invalid login");
  }
}

function updateCount() {
  let total = document.querySelectorAll('.slot').length;
  let reserved = document.querySelectorAll('.reserved').length;
  document.getElementById("count").innerText =
    "Available Slots: " + (total - reserved);
}

function reserve(slot) {
  let originalName = slot.innerText;
  let duration = Number(document.getElementById("duration").value);

  if (!slot.classList.contains("reserved")) {
    slot.classList.add("reserved");
    slot.setAttribute("data-manual", "true");

    let timeLeft = duration;

    let interval = setInterval(() => {
      timeLeft--;

      let minutes = Math.floor(timeLeft / 60);
      let seconds = timeLeft % 60;

      slot.innerText = `${minutes}m ${seconds}s`;

      if (timeLeft <= 0) {
        clearInterval(interval);
        slot.classList.remove("reserved");
        slot.removeAttribute("data-manual");
        slot.innerText = originalName;
        updateCount();
      }
    }, 1000);

    updateCount();

  } else {
    alert("Already Reserved!");
  }
}

function fetchData() {
  fetch("https://parkease-backend-6vpq.onrender.com/data")
    .then(res => res.json())
    .then(data => {

      document.querySelectorAll(".slot").forEach(slot => {
        if (slot.getAttribute("data-manual") === "true") return;

        let id = slot.getAttribute("data-id");

        if (data[id] === 1) {
          slot.classList.add("reserved");
        } else {
          slot.classList.remove("reserved");
        }
      });

      updateCount();
    });
}

setInterval(fetchData, 2000);

</script>

</body>
</html>
