<!DOCTYPE html>
<html>
<head>
  <title>ParkEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #020617;
      color: white;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT SIDE (BRANDING) */
    .left {
      flex: 1;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: radial-gradient(circle at top, #0f172a, #020617);
    }

    .left h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    .left p {
      color: #94a3b8;
      max-width: 400px;
      line-height: 1.6;
    }

    /* RIGHT SIDE */
    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* GLASS PANEL */
    .panel {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 20px;
      width: 340px;
      box-shadow: 0 0 40px rgba(59,130,246,0.2);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #0f172a;
      color: white;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 120px);
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
    }

    /* SLOT */
    .slot {
      height: 120px;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 600;
      background: linear-gradient(135deg, #22c55e, #15803d);
      cursor: pointer;
      transition: 0.3s;
    }

    .slot:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .slot.reserved {
      background: linear-gradient(135deg, #ef4444, #7f1d1d);
      box-shadow: 0 0 20px rgba(239,68,68,0.6);
    }

    #dashboard {
      display: none;
      width: 100%;
      height: 100%;
    }

    #login {
      width: 100%;
      display: flex;
    }

  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <div class="left">
    <h1>🚗 ParkEase</h1>
    <p>Smart parking system that lets users reserve slots in real-time with seamless tracking and automated availability updates.</p>
  </div>

  <div class="right">
    <div class="panel">
      <h2>Login</h2>
      <input id="username" placeholder="Username">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">Enter Dashboard</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="left">
    <h1>Dashboard</h1>
    <p id="count"></p>

    <label>Select Duration</label>
    <select id="duration">
      <option value="7200">2 hours - ₹60</option>
      <option value="14400">4 hours - ₹120</option>
    </select>

    <p id="price"></p>
  </div>

  <div class="right">
    <div class="panel">
      <h3>Parking Slots</h3>

      <div class="grid">
        <div class="slot" data-id="P1" onclick="reserve(this)">P1</div>
        <div class="slot" data-id="P2" onclick="reserve(this)">P2</div>
        <div class="slot" data-id="P3" onclick="reserve(this)">P3</div>
        <div class="slot" data-id="P4" onclick="reserve(this)">P4</div>
      </div>
    </div>
  </div>
</div>

<script>

function login() {
  if (
    document.getElementById("username").value === "admin" &&
    document.getElementById("password").value === "1234"
  ) {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "flex";
    updateCount();
  }
}

document.getElementById("duration").addEventListener("change", function () {
  let price = (this.value / 3600) * 30;
  document.getElementById("price").innerText = "Price: ₹" + price;
});

function updateCount() {
  let total = document.querySelectorAll('.slot').length;
  let reserved = document.querySelectorAll('.reserved').length;
  document.getElementById("count").innerText =
    "Available Slots: " + (total - reserved);
}

function reserve(slot) {
  if (!slot.classList.contains("reserved")) {
    slot.classList.add("reserved");
    updateCount();
  }
}

function fetchData() {
  fetch("https://parkease-backend-6vpq.onrender.com/data")
    .then(res => res.json())
    .then(data => {
      document.querySelectorAll(".slot").forEach(slot => {
        let id = slot.dataset.id;
        if (data[id] === 1) slot.classList.add("reserved");
        else slot.classList.remove("reserved");
      });
      updateCount();
    });
}

setInterval(fetchData, 2000);

</script>

</body>
</html>
