<!DOCTYPE html>
<html>
<head>
  <title>Park Ease</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: #e2e8f0;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* SUBTLE BACKGROUND GLOW */
    body::before {
      content: "";
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56,189,248,0.15), transparent);
      top: -100px;
      right: -100px;
      z-index: -1;
    }

    /* LOGIN */
    #login {
      margin-top: 120px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 28px;
      width: 320px;
      margin: auto;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
      transform: scale(1.03);
    }

    /* DASHBOARD */
    #dashboard {
      display: none;
    }

    .info-card {
      margin: 30px auto;
      width: 320px;
    }

    /* GRID */
    .parking-grid {
      display: grid;
      grid-template-columns: repeat(2, 130px);
      gap: 25px;
      justify-content: center;
      margin-top: 50px;
    }

    /* SLOT */
    .slot {
      height: 130px;
      border-radius: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      background: #16a34a;
      transition: 0.25s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .slot:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .slot.reserved {
      background: #dc2626;
      box-shadow: 0 0 15px rgba(220,38,38,0.5);
    }

    label {
      font-size: 14px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>🚗 Park Ease</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h1>🚗 Park Ease</h1>

  <div class="card info-card">
    <p id="count"></p>

    <label>Select Duration</label><br>

    <select id="duration">
      <option value="7200">2 hours - ₹60</option>
      <option value="14400">4 hours - ₹120</option>
    </select>

    <p id="price"></p>
  </div>

  <div class="parking-grid">
    <div class="slot" data-id="P1" onclick="reserve(this)">P1</div>
    <div class="slot" data-id="P2" onclick="reserve(this)">P2</div>
    <div class="slot" data-id="P3" onclick="reserve(this)">P3</div>
    <div class="slot" data-id="P4" onclick="reserve(this)">P4</div>
  </div>

</div>

<script>

document.getElementById("duration").addEventListener("change", function() {
  let value = Number(this.value);
  let price = (value / 3600) * 30;
  document.getElementById("price").innerText = "Price: ₹" + price;
});

function login() {
  if (
    document.getElementById("username").value === "admin" &&
    document.getElementById("password").value === "1234"
  ) {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    updateCount();
  } else {
    alert("Invalid login");
  }
}

function updateCount() {
  let total = document.querySelectorAll('.slot').length;
  let reserved = document.querySelectorAll('.reserved').length;
  document.getElementById("count").innerText =
    "Available Slots: " + (total - reserved);
}

function reserve(slot) {
  let original = slot.innerText;
  let duration = Number(document.getElementById("duration").value);

  if (!slot.classList.contains("reserved")) {
    slot.classList.add("reserved");

    let timeLeft = duration;

    let interval = setInterval(() => {
      timeLeft--;

      let m = Math.floor(timeLeft / 60);
      let s = timeLeft % 60;

      slot.innerText = `${m}m ${s}s`;

      if (timeLeft <= 0) {
        clearInterval(interval);
        slot.classList.remove("reserved");
        slot.innerText = original;
        updateCount();
      }
    }, 1000);

    updateCount();
  }
}

function fetchData() {
  fetch("https://parkease-backend-6vpq.onrender.com/data")
    .then(res => res.json())
    .then(data => {
      document.querySelectorAll(".slot").forEach(slot => {
        let id = slot.getAttribute("data-id");

        if (data[id] === 1) {
          slot.classList.add("reserved");
        } else {
          slot.classList.remove("reserved");
        }
      });

      updateCount();
    });
}

setInterval(fetchData, 2000);

</script>

</body>
</html>
