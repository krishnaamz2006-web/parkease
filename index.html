<!DOCTYPE html>
<html>
<head>
  <title>ParkEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    /* NAVBAR */
    .navbar {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      border-bottom: 1px solid #1f2937;
      font-weight: 600;
      font-size: 18px;
    }

    /* MAIN CONTAINER */
    .container {
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .sub {
      color: #9ca3af;
      margin-bottom: 30px;
    }

    /* CARD */
    .card {
      background: #111827;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1px solid #1f2937;
    }

    select {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #020617;
      color: white;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 150px);
      gap: 20px;
    }

    /* SLOT */
    .slot {
      height: 140px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 500;
      cursor: pointer;
      background: #16a34a;
      transition: 0.2s;
    }

    .slot:hover {
      transform: translateY(-2px);
    }

    .slot.reserved {
      background: #dc2626;
    }

    /* LOGIN */
    #login {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      border: 1px solid #1f2937;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #020617;
      color: white;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #dashboard {
      display: none;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>ParkEase</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="navbar">🚗 ParkEase</div>

  <div class="container">
    <h1>Parking Dashboard</h1>
    <div class="sub">Manage and reserve parking slots in real-time</div>

    <div class="card">
      <div id="count"></div>

      <label>Select Duration</label><br>

      <select id="duration">
        <option value="7200">2 hours - ₹60</option>
        <option value="14400">4 hours - ₹120</option>
      </select>

      <div id="price"></div>
    </div>

    <div class="grid">
      <div class="slot" data-id="P1" onclick="reserve(this)">P1</div>
      <div class="slot" data-id="P2" onclick="reserve(this)">P2</div>
      <div class="slot" data-id="P3" onclick="reserve(this)">P3</div>
      <div class="slot" data-id="P4" onclick="reserve(this)">P4</div>
    </div>

  </div>
</div>

<script>

function login() {
  if (
    document.getElementById("username").value === "admin" &&
    document.getElementById("password").value === "1234"
  ) {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    updateCount();
  }
}

document.getElementById("duration").addEventListener("change", function () {
  let price = (this.value / 3600) * 30;
  document.getElementById("price").innerText = "Price: ₹" + price;
});

function updateCount() {
  let total = document.querySelectorAll('.slot').length;
  let reserved = document.querySelectorAll('.reserved').length;
  document.getElementById("count").innerText =
    "Available Slots: " + (total - reserved);
}

function reserve(slot) {
  if (!slot.classList.contains("reserved")) {
    slot.classList.add("reserved");
    updateCount();
  }
}

function fetchData() {
  fetch("https://parkease-backend-6vpq.onrender.com/data")
    .then(res => res.json())
    .then(data => {
      document.querySelectorAll(".slot").forEach(slot => {
        let id = slot.dataset.id;
        if (data[id] === 1) slot.classList.add("reserved");
        else slot.classList.remove("reserved");
      });
      updateCount();
    });
}

setInterval(fetchData, 2000);

</script>

</body>
</html>
