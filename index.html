<!DOCTYPE html>
<html>
<head>
  <title>ParkEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #020617;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      padding: 15px 40px;
      border-bottom: 1px solid #1f2937;
      font-weight: 600;
      font-size: 18px;
    }

    .container {
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin-bottom: 10px;
    }

    .sub {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    select {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #0f172a;
      color: white;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 150px);
      gap: 20px;
      justify-content: center;
    }

    /* SLOT */
    .slot {
      height: 140px;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: 500;
      cursor: pointer;
      background: #16a34a;
      transition: 0.25s;
      box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    }

    .slot:hover {
      transform: translateY(-4px);
    }

    .slot.reserved {
      background: #dc2626;
    }

    .timer {
      font-size: 12px;
      margin-top: 5px;
    }

    /* LOGIN */
    #login {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #0f172a;
      color: white;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #dashboard {
      display: none;
    }

    /* TOAST */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #22c55e;
      padding: 12px 18px;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(-20px);
      transition: 0.4s;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>ParkEase</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="navbar">🚗 ParkEase</div>

  <div class="container">
    <h1>Parking Dashboard</h1>
    <div class="sub">Reserve and manage slots in real-time</div>

    <div class="card">
      <div id="count"></div>

      <label>Select Duration</label><br>

      <select id="duration">
        <option value="7200">2 hours - ₹60</option>
        <option value="14400">4 hours - ₹120</option>
      </select>

      <div id="price"></div>
    </div>

    <div class="grid">
      <div class="slot" data-id="P1" onclick="reserve(this)">P1</div>
      <div class="slot" data-id="P2" onclick="reserve(this)">P2</div>
      <div class="slot" data-id="P3" onclick="reserve(this)">P3</div>
      <div class="slot" data-id="P4" onclick="reserve(this)">P4</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>

let slotTimers = {};

// LOGIN
function login() {
  if (
    document.getElementById("username").value === "admin" &&
    document.getElementById("password").value === "1234"
  ) {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    updateCount();
  }
}

// PRICE
document.getElementById("duration").addEventListener("change", function () {
  let price = (this.value / 3600) * 30;
  document.getElementById("price").innerText = "Price: ₹" + price;
});

// COUNT
function updateCount() {
  let total = document.querySelectorAll('.slot').length;
  let reserved = document.querySelectorAll('.reserved').length;
  document.getElementById("count").innerText =
    "Available Slots: " + (total - reserved);
}

// TOAST
function showToast(msg) {
  let toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2500);
}

// RESERVE
function reserve(slot) {

  let id = slot.dataset.id;

  if (slot.classList.contains("reserved")) return;

  let duration = parseInt(document.getElementById("duration").value);

  slot.classList.add("reserved");

  let timerDiv = document.createElement("div");
  timerDiv.className = "timer";
  slot.appendChild(timerDiv);

  let endTime = Date.now() + duration * 1000;

  slotTimers[id] = { end: endTime, element: timerDiv };

  showToast("Slot " + id + " booked");

  updateCount();

  let interval = setInterval(() => {

    let remaining = endTime - Date.now();

    if (remaining <= 0) {
      clearInterval(interval);
      slot.classList.remove("reserved");
      timerDiv.remove();
      delete slotTimers[id];
      updateCount();
      return;
    }

    let h = Math.floor(remaining / (1000 * 60 * 60));
    let m = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
    let s = Math.floor((remaining % (1000 * 60)) / 1000);

    timerDiv.innerText = `${h}h ${m}m ${s}s`;

  }, 1000);
}

// BACKEND SYNC
function fetchData() {
  fetch("https://parkease-backend-6vpq.onrender.com/data")
    .then(res => res.json())
    .then(data => {
      document.querySelectorAll(".slot").forEach(slot => {
        let id = slot.dataset.id;

        if (!slotTimers[id]) {
          if (data[id] === 1) slot.classList.add("reserved");
          else slot.classList.remove("reserved");
        }
      });

      updateCount();
    });
}

setInterval(fetchData, 3000);

</script>

</body>
</html>
